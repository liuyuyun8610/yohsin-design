<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物誌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F7F4EF;--bark:#3D2B1F;--moss:#4A6741;--sage:#8FAF85;--clay:#C4855A;--parch:#EDE8DF;--leaf:#6B9E5E;--mist:#D4DDD1}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--bark);min-height:100vh}
.header{background:var(--bark);color:var(--cream);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;background:var(--leaf);border-radius:50% 50% 50% 8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.brand h1{font-family:'Playfair Display',serif;font-size:19px;font-weight:400}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#aaa;margin-left:8px;display:inline-block}
.sync-dot.ok{background:#4CAF50}.sync-dot.err{background:#f44336}.sync-dot.loading{background:#FF9800;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-add{background:var(--leaf);color:#fff;border:none;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer}
.btn-add:hover{background:var(--moss)}
.nav{display:flex;background:var(--parch);border-bottom:1px solid var(--mist);padding:0 24px}
.ntab{padding:11px 16px;font-size:13px;font-weight:500;color:#888;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none}
.ntab.on{color:var(--moss);border-bottom-color:var(--moss)}
.ntab:hover:not(.on){color:var(--bark)}
.main{padding:22px 24px;max-width:880px;margin:0 auto}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--mist);cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(61,43,31,.1)}
.card-img{width:100%;aspect-ratio:1;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:50px;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-img .ef{position:relative;z-index:1}
.card-body{padding:13px}
.card-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;margin-bottom:2px}
.card-latin{font-size:11px;color:#888;font-style:italic;margin-bottom:8px}
.tag{font-size:10px;padding:3px 7px;border-radius:10px;font-weight:500;display:inline-block;margin:2px 2px 0 0}
.tg{background:#E8F5E4;color:#3A7D2C}.to{background:#FFF3E0;color:#B06000}.tw{background:#E3F2FD;color:#1565C0}.ts{background:var(--parch);color:var(--bark)}
.wbadge{position:absolute;top:8px;right:8px;width:12px;height:12px;background:#E53935;border-radius:50%;border:2px solid #fff;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.remind{background:#E3F2FD;border:1px solid #BBDEFB;border-radius:12px;padding:11px 16px;margin-bottom:18px;display:flex;align-items:center;gap:9px;font-size:13px;color:#1565C0}
.dpanel{background:#fff;border-radius:18px;border:1px solid var(--mist);overflow:hidden}
.dh{background:var(--bark);color:var(--cream);padding:18px 22px;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.dh-emoji{font-size:38px;flex-shrink:0}
.dh-info{flex:1;min-width:0}
.dh-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:400}
.dh-latin{font-size:13px;opacity:.7;font-style:italic}
.dh-btns{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn-back{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 13px;border-radius:13px;font-size:12px;cursor:pointer}
.btn-del{background:rgba(220,60,60,.3);color:#ffcdd2;border:1px solid rgba(220,60,60,.5);padding:6px 13px;border-radius:13px;font-size:12px;cursor:pointer}
.dbody{padding:20px}
.dtabs{display:flex;border-bottom:1px solid var(--mist);margin-bottom:18px}
.dtab{padding:8px 15px;font-size:13px;font-weight:500;color:#888;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none}
.dtab.on{color:var(--moss);border-bottom-color:var(--moss)}
.sec{display:none}.sec.on{display:block}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.icard{background:var(--parch);border-radius:11px;padding:13px}
.ilabel{font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.ivalue{font-size:15px;font-weight:500}
.jentry{border-left:3px solid var(--sage);padding:11px 15px;margin-bottom:11px;background:var(--parch);border-radius:0 11px 11px 0}
.jdate{font-size:11px;color:#888;margin-bottom:3px}
.jtext{font-size:14px;line-height:1.6}
.hrow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--mist);font-size:13px}
.hdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.photo-g{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:11px}
.photo-g .thumb{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;background:var(--mist)}
.photo-g .thumb img{width:100%;height:100%;object-fit:cover}
.thumb-cover-btn{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);background:rgba(61,43,31,.7);color:#fff;font-size:10px;padding:2px 7px;border-radius:8px;border:none;cursor:pointer;white-space:nowrap}
.thumb-cover-btn.active{background:var(--leaf)}
.fl{font-size:12px;font-weight:500;color:#666;margin-bottom:5px;display:block;letter-spacing:.03em}
.fi,.ft{width:100%;background:var(--parch);border:1px solid var(--mist);border-radius:10px;padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--bark);outline:none;transition:border-color .15s}
.fi:focus,.ft:focus{border-color:var(--sage)}
.ft{resize:vertical;min-height:75px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fsec{margin-bottom:18px}
.shop-wrap{position:relative}
.shop-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--mist);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:50;margin-top:2px;display:none;max-height:180px;overflow-y:auto}
.shop-dropdown.open{display:block}
.shop-opt{padding:9px 13px;font-size:14px;cursor:pointer;color:var(--bark)}
.shop-opt:hover{background:var(--parch)}
.shop-opt.add-new{color:var(--moss);font-weight:500}
.cover-upload{border:2px dashed var(--mist);border-radius:12px;padding:16px;text-align:center;color:#aaa;font-size:13px;cursor:pointer;background:var(--parch)}
.cover-upload:hover{border-color:var(--sage);color:var(--moss)}
.cover-preview{width:100%;height:120px;object-fit:cover;border-radius:10px;display:none}
.upload{border:2px dashed var(--mist);border-radius:12px;padding:22px;text-align:center;color:#aaa;font-size:13px;cursor:pointer;background:var(--parch)}
.upload:hover{border-color:var(--sage);color:var(--moss)}
.bsub{background:var(--moss);color:#fff;border:none;padding:11px 24px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;width:100%}
.bsub:hover{background:var(--bark)}
.stitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;margin-bottom:15px}
.empty{text-align:center;padding:40px 20px;color:#bbb}
.empty .big{font-size:44px;margin-bottom:10px}
.wrow{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--mist)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.cbox{background:#fff;border-radius:18px;padding:28px 24px;width:290px;text-align:center}
.cbox .icon{font-size:36px;margin-bottom:10px}
.cbox h3{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:6px;color:var(--bark)}
.cbox p{font-size:13px;color:#888;line-height:1.5;margin-bottom:20px}
.cbtns{display:flex;gap:10px}
.cc{flex:1;background:var(--parch);color:var(--bark);border:1px solid var(--mist);padding:10px;border-radius:12px;font-size:14px;cursor:pointer}
.cd{flex:1;background:#DC3545;color:#fff;border:none;padding:10px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer}
.loading-screen{position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:500;font-size:15px;color:var(--bark)}
.spinner{width:36px;height:36px;border:3px solid var(--mist);border-top-color:var(--leaf);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Dashboard */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--mist);border-radius:16px;padding:18px 20px}
.stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-family:'Playfair Display',serif;font-size:30px;color:var(--bark);line-height:1}
.stat-sub{font-size:12px;color:var(--sage);margin-top:4px}
.dash-section{background:#fff;border:1px solid var(--mist);border-radius:16px;padding:20px;margin-bottom:18px}
.dash-section h3{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;margin-bottom:14px;color:var(--bark)}
.shop-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px}
.shop-bar-label{width:90px;flex-shrink:0;color:var(--bark);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shop-bar-track{flex:1;background:var(--parch);border-radius:6px;height:10px;overflow:hidden}
.shop-bar-fill{height:100%;background:var(--leaf);border-radius:6px;transition:width .4s}
.shop-bar-val{min-width:60px;text-align:right;color:#888}
.rank-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--mist);font-size:13px}
.rank-no{width:22px;height:22px;border-radius:50%;background:var(--parch);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--moss);flex-shrink:0}
.rank-emoji{font-size:18px;flex-shrink:0}
.rank-name{flex:1;font-weight:500}
.rank-price{color:var(--clay);font-weight:500}
/* Cover position adjuster */
.pos-overlay{position:absolute;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px;background:rgba(0,0,0,.35)}
.card-img:hover .pos-overlay{display:flex}
.pos-hint{color:#fff;font-size:10px;margin-bottom:5px;opacity:.85}
.pos-arrows{display:grid;grid-template-columns:repeat(3,28px);grid-template-rows:repeat(3,28px);gap:2px}
.pos-btn{width:28px;height:28px;background:rgba(255,255,255,.25);border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pos-btn:hover{background:rgba(255,255,255,.45)}
.pos-btn.center{background:rgba(255,255,255,.1);cursor:default}
/* Edit modal */
.edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.edit-modal.show{display:flex}
.edit-box{background:var(--cream);border-radius:20px;padding:28px 24px;width:100%;max-width:520px;margin:auto}
.edit-box h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;margin-bottom:20px}
.edit-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;margin-top:-4px}
/* Cover position editor in edit modal */
.cover-pos-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;background:var(--mist);margin-bottom:12px}
.cover-pos-wrap img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.cover-pos-wrap .no-cover{display:flex;align-items:center;justify-content:center;height:100%;font-size:48px;color:#ccc}
.pos-crosshair{position:absolute;width:28px;height:28px;border:2px solid #fff;border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.3);transform:translate(-50%,-50%);pointer-events:none;transition:left .15s,top .15s}
.pos-drag-area{position:absolute;inset:0;cursor:crosshair}
.pos-label{font-size:11px;color:#888;margin-bottom:6px}
.pos-hint-txt{font-size:11px;color:#aaa;margin-top:6px;text-align:center}
/* Tag filter bar */
.tag-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.tag-filter{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--mist);background:#fff;color:#888;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.tag-filter:hover{border-color:var(--sage);color:var(--moss)}
.tag-filter.on{background:var(--moss);color:#fff;border-color:var(--moss)}
.tag-filter.all.on{background:var(--bark);border-color:var(--bark)}
/* Tag input */
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;background:var(--parch);border:1px solid var(--mist);border-radius:10px;padding:7px 10px;min-height:42px;align-items:center;cursor:text;position:relative}
.tag-input-wrap:focus-within{border-color:var(--sage)}
.tag-pill{display:inline-flex;align-items:center;gap:4px;background:var(--moss);color:#fff;font-size:12px;padding:3px 9px;border-radius:20px}
.tag-pill button{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;padding:0;line-height:1;opacity:.7}
.tag-pill button:hover{opacity:1}
.tag-input-wrap input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--bark);min-width:80px;flex:1}
.tag-suggest{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--mist);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:60;margin-top:2px;display:none;max-height:160px;overflow-y:auto}
.tag-suggest.open{display:block}
.tag-sopt{padding:8px 13px;font-size:13px;cursor:pointer;color:var(--bark)}
.tag-sopt:hover{background:var(--parch)}
.tag-sopt.new{color:var(--moss);font-weight:500}
/* Tag display in detail */
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.detail-tag{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--parch);color:var(--moss);border:1px solid var(--mist);font-weight:500}
/* Materials */
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.mat-card{background:#fff;border-radius:14px;border:1px solid var(--mist);padding:16px;position:relative;transition:transform .15s,box-shadow .15s;cursor:pointer}
.mat-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(61,43,31,.09)}
.mat-card.low{border-color:#FFB74D;background:#FFFBF5}
.mat-icon{font-size:30px;margin-bottom:8px}
.mat-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;margin-bottom:2px}
.mat-sub{font-size:11px;color:#888;margin-bottom:8px}
.mat-qty{font-size:22px;font-weight:500;font-family:'Playfair Display',serif;color:var(--bark)}
.mat-qty-unit{font-size:12px;color:#888;margin-left:3px}
.mat-low-badge{position:absolute;top:10px;right:10px;background:#FF9800;color:#fff;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.mat-actions{display:flex;gap:6px;margin-top:10px}
.mat-btn{flex:1;padding:6px 0;font-size:12px;border-radius:8px;border:1px solid var(--mist);background:var(--parch);color:var(--bark);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.mat-btn.in{background:#E8F5E4;color:#3A7D2C;border-color:#C8E6C9}
.mat-btn.out{background:#FFF3E0;color:#B06000;border-color:#FFE0B2}
.mat-btn.edit{background:var(--parch);color:#555}
.log-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--mist);font-size:13px}
.log-in{color:#3A7D2C;font-weight:500}.log-out{color:#B06000;font-weight:500}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cat-tab{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--mist);background:#fff;color:#888;cursor:pointer;font-family:'DM Sans',sans-serif}
.cat-tab.on{background:var(--bark);color:#fff;border-color:var(--bark)}
/* Material modal */
.mat-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.mat-modal.show{display:flex}
.mat-box{background:var(--cream);border-radius:20px;padding:28px 24px;width:100%;max-width:480px;margin:auto}
.mat-box h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;margin-bottom:20px}
.txn-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.txn-modal.show{display:flex}
.txn-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center}
.txn-box h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;margin-bottom:6px}
.txn-box p{font-size:13px;color:#888;margin-bottom:18px}
.qty-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:20px}
.qty-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--mist);background:var(--parch);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-val{font-family:'Playfair Display',serif;font-size:36px;min-width:60px}
.mat-log-section{background:#fff;border:1px solid var(--mist);border-radius:14px;padding:16px;margin-top:16px}
.mat-log-section h4{font-size:13px;font-weight:500;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div>連線中...</div>
</div>

<header class="header">
  <div class="brand">
    <div class="logo">&#127807;</div>
    <h1>植物誌</h1>
    <span class="sync-dot loading" id="sync-dot" title="同步狀態"></span>
  </div>
  <button class="btn-add" onclick="go('add')">＋ 新增植物</button>
</header>
<nav class="nav">
  <button class="ntab on" onclick="go('grid',this)">我的植物</button>
  <button class="ntab" onclick="go('mat',this)">🪣 資材</button>
  <button class="ntab" onclick="go('dash',this)">📊 報表</button>
</nav>

<div class="main">
  <div id="v-grid">
    <div class="remind" id="wr" style="display:none">&#128167; 今日提醒：<strong id="rn" style="margin-left:3px"></strong> 需要澆水了！</div>
    <!-- Search + tag filter -->
    <div style="margin-bottom:14px">
      <input class="fi" id="grid-search" placeholder="🔍 搜尋植物名稱..." oninput="renderGrid()" style="margin-bottom:10px">
      <div class="tag-bar" id="tag-bar"></div>
    </div>
    <div class="pgrid" id="pgrid"></div>
    <div class="empty" id="ge" style="display:none"><div class="big">&#127807;</div><p>沒有符合的植物</p></div>
  </div>

  <div id="v-detail" style="display:none">
    <div class="dpanel">
      <div class="dh">
        <div class="dh-emoji" id="de"></div>
        <div class="dh-info"><div class="dh-title" id="dn"></div><div class="dh-latin" id="dl"></div></div>
      </div>
      <div style="display:flex;gap:8px;padding:12px 22px;background:var(--bark);border-top:1px solid rgba(255,255,255,.1)">
        <button class="btn-back" onclick="go('grid')">← 返回</button>
        <button class="btn-back" onclick="openEdit()" style="background:rgba(255,255,255,.2)">✏️ 編輯</button>
        <button class="btn-del" onclick="askDel()" style="margin-left:auto">&#128465; 刪除</button>
      </div>
      <div class="dbody">
        <div class="dtabs">
          <button class="dtab on" onclick="dtab('info',this)">基本資料</button>
          <button class="dtab" onclick="dtab('health',this)">健康記錄</button>
          <button class="dtab" onclick="dtab('jour',this)">日誌</button>
          <button class="dtab" onclick="dtab('photo',this)">照片</button>
        </div>
        <div class="sec on" id="ds-info"><div class="igrid" id="dig"></div></div>
        <div class="sec" id="ds-health">
          <div id="dhl"></div>
          <div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:14px">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5xA-GEvgLlxBF_jQjO73vPs-D5y1whms",
  authDomain: "plant-manager-7f599.firebaseapp.com",
  databaseURL: "https://plant-manager-7f599-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "plant-manager-7f599",
  storageBucket: "plant-manager-7f599.firebasestorage.app",
  messagingSenderId: "937336218253",
  appId: "1:937336218253:web:eaa987e7523bac08d778c4",
  measurementId: "G-N98TMQNX4D"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const plantsRef = ref(db, 'plants');
const matsRef = ref(db, 'materials');

var plants = [];
var mats = [];
var cur = null;
var curMat = null;
var txnType = '';
var txnQtyVal = 1;
var newCoverData = '';
var editingMatKey = null;
var curMatCat = '';

onValue(matsRef, function(snapshot) {
  var data = snapshot.val();
  mats = data ? Object.entries(data).map(function(e){
    return Object.assign({fbKey: e[0]}, e[1]);
  }) : [];
  if(document.getElementById('v-mat').style.display !== 'none') renderMat();
});

function setSyncDot(state) {
  var d = document.getElementById('sync-dot');
  d.className = 'sync-dot ' + state;
}

// Listen to Firebase realtime updates
onValue(plantsRef, function(snapshot) {
  var data = snapshot.val();
  plants = data ? Object.entries(data).map(function(e){
    return Object.assign({fbKey: e[0]}, e[1]);
  }) : [];
  document.getElementById('loading').style.display = 'none';
  setSyncDot('ok');
  renderGrid();
  if(cur) {
    var p = plants.find(function(x){ return x.fbKey===cur; });
    if(p) { renderHL(p); renderJL(p); renderPh(p); }
  }
}, function(err) {
  console.error(err);
  setSyncDot('err');
  document.getElementById('loading').style.display = 'none';
});

function dago(d){ return Math.floor((new Date()-new Date(d))/86400000); }
function due(p){ return dago(p.lastW) >= p.wdays; }

function getShops() {
  var s = {};
  plants.forEach(function(p){ if(p.shop) s[p.shop]=1; });
  return Object.keys(s).sort();
}

var curTag = ''; // currently selected filter tag
var addTags = []; // tags being added in add form
var editTags = []; // tags being edited in edit form

function getAllTags() {
  var t = {};
  plants.forEach(function(p){ (p.tags||[]).forEach(function(tag){ t[tag]=1; }); });
  return Object.keys(t).sort();
}

window.go = function(v, el) {
  ['grid','detail','jglobal','water','mat','dash','add'].forEach(function(x){
    var e=document.getElementById('v-'+x); if(e) e.style.display='none';
  });  document.getElementById('v-'+v).style.display='block';
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  if(el) el.classList.add('on');
  else if(v==='grid') document.querySelector('.ntab').classList.add('on');
  if(v==='grid') renderGrid();
  if(v==='jglobal') renderGJ();
  if(v==='water') renderW();
  if(v==='mat') renderMat();
  if(v==='dash') renderDash();
  if(v==='add') { newCoverData=''; resetCoverPreview(); }
};

function renderTagBar() {
  var tags = getAllTags();
  var bar = document.getElementById('tag-bar');
  bar.innerHTML = '<button class="tag-filter all'+(curTag===''?' on':'')+'" onclick="setTagFilter(\'\')">全部</button>' +
    tags.map(function(t){
      return '<button class="tag-filter'+(curTag===t?' on':'')+'" onclick="setTagFilter(\''+t+'\')">'+t+'</button>';
    }).join('');
}
window.setTagFilter = function(t) { curTag = t; renderGrid(); };

function renderGrid() {
  var dp = plants.filter(due);
  var wr = document.getElementById('wr');
  if(dp.length){ wr.style.display='flex'; document.getElementById('rn').textContent=dp.map(function(p){return p.name;}).join('、'); }
  else wr.style.display='none';

  renderTagBar();

  var q = (document.getElementById('grid-search')||{value:''}).value.toLowerCase();
  var filtered = plants.filter(function(p){
    var matchTag = !curTag || (p.tags||[]).indexOf(curTag) > -1;
    var matchSearch = !q || p.name.toLowerCase().includes(q) || (p.latin||'').toLowerCase().includes(q);
    return matchTag && matchSearch;
  });

  var grid=document.getElementById('pgrid'), ge=document.getElementById('ge');
  if(!filtered.length){ grid.innerHTML=''; ge.style.display='block'; return; }
  ge.style.display='none';
  grid.innerHTML = filtered.map(function(p){
    var d=due(p), ds=dago(p.lastW);
    var posX = p.coverX||50, posY = p.coverY||50;
    var imgH = p.cover
      ? '<img src="'+p.cover+'" alt="" style="object-position:'+posX+'% '+posY+'%">'
      : '<span class="ef">'+p.emoji+'</span>';
    var tagsHtml = (p.tags||[]).map(function(t){ return '<span class="tag" style="background:#E8F5E4;color:#3A7D2C">'+t+'</span>'; }).join('');
    return '<div class="card" onclick="openP(\''+p.fbKey+'\')">'+(d?'<div class="wbadge" title="需要澆水"></div>':'')+
      '<div class="card-img">'+imgH+'</div>'+
      '<div class="card-body">'+
        '<div class="card-name">'+p.name+'</div>'+
        '<div class="card-latin">'+(p.latin||'—')+'</div>'+
        '<div>'+
          '<span class="tag '+(p.health==='良好'?'tg':'to')+'">'+p.health+'</span>'+
          (p.shop?'<span class="tag ts">'+p.shop+'</span>':'')+
          tagsHtml+
        '</div>'+
        '<div style="font-size:11px;color:#aaa;margin-top:5px">上次澆水 '+ds+' 天前</div>'+
      '</div></div>';
  }).join('');
}

window.openP = function(key) {
  cur = key;
  var p = plants.find(function(x){ return x.fbKey===key; });
  document.getElementById('de').textContent = p.emoji;
  document.getElementById('dn').textContent = p.name;
  document.getElementById('dl').textContent = p.latin||'';
  document.getElementById('dig').innerHTML = [
    ['學名',p.latin||'—'],['入手日期',p.date||'—'],
    ['購買店家',p.shop||'—'],['價格',p.price?'NT$ '+p.price:'—'],
    ['澆水頻率','每 '+p.wdays+' 天'],['健康狀態',p.health],
    ['備註',p.note||'—',true]
  ].map(function(a){
    return '<div class="icard"'+(a[2]?' style="grid-column:1/-1"':'')+'>'+
      '<div class="ilabel">'+a[0]+'</div><div class="ivalue">'+a[1]+'</div></div>';
  }).join('') + ((p.tags&&p.tags.length) ? '<div class="icard" style="grid-column:1/-1"><div class="ilabel">標籤</div><div class="detail-tags">'+p.tags.map(function(t){return '<span class="detail-tag">'+t+'</span>';}).join('')+'</div></div>' : '');
  renderHL(p); renderJL(p); renderPh(p);
  window.dtab('info'); window.go('detail');
};

function renderHL(p) {
  var el=document.getElementById('dhl');
  if(!p.hlog||!p.hlog.length){ el.innerHTML='<div style="color:#aaa;font-size:13px;padding:8px 0">尚無健康記錄</div>'; return; }
  el.innerHTML = p.hlog.slice().reverse().map(function(h){
    return '<div class="hrow"><div class="hdot" style="background:'+(h.t==='g'?'#4CAF50':'#FF9800')+'"></div>'+
      '<span style="color:#888;font-size:12px">'+h.date+'</span><span>'+h.s+'</span></div>';
  }).join('');
}
function renderJL(p) {
  var el=document.getElementById('djl');
  if(!p.journal||!p.journal.length){ el.innerHTML='<div style="color:#aaa;font-size:13px;padding:8px 0">還沒有日誌，寫下第一篇吧！</div>'; return; }
  el.innerHTML = p.journal.slice().reverse().map(function(j){
    return '<div class="jentry"><div class="jdate">'+j.date+'</div><div class="jtext">'+j.text+'</div></div>';
  }).join('');
}
function renderPh(p) {
  var photos = p.photos||[];
  document.getElementById('photo-g').innerHTML = photos.map(function(s,i){
    var isC = p.cover===s;
    return '<div class="thumb"><img src="'+s+'" alt="">'+
      '<button class="thumb-cover-btn'+(isC?' active':'')+'" onclick="setCover(event,'+i+')">'+
        (isC?'✓ 封面':'設為封面')+
      '</button></div>';
  }).join('');
}

window.setCover = function(e, idx) {
  e.stopPropagation();
  var p = plants.find(function(x){ return x.fbKey===cur; });
  var newCover = (p.cover===(p.photos||[])[idx]) ? '' : (p.photos||[])[idx];
  setSyncDot('loading');
  update(ref(db,'plants/'+cur), {cover: newCover});
};

window.addH = function(s, t) {
  var p = plants.find(function(x){ return x.fbKey===cur; });
  var hlog = (p.hlog||[]).concat([{date:new Date().toISOString().split('T')[0],s:s,t:t}]);
  setSyncDot('loading');
  update(ref(db,'plants/'+cur), {hlog:hlog, health:s});
};

window.addJ = function() {
  var el=document.getElementById('nje'), txt=el.value.trim(); if(!txt) return;
  var p = plants.find(function(x){ return x.fbKey===cur; });
  var journal = (p.journal||[]).concat([{date:new Date().toISOString().split('T')[0],text:txt}]);
  setSyncDot('loading');
  update(ref(db,'plants/'+cur), {journal:journal});
  el.value='';
};

window.upPhoto = function(e) {
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    var p = plants.find(function(x){ return x.fbKey===cur; });
    var photos = (p.photos||[]).concat([ev.target.result]);
    var cover = p.cover||ev.target.result;
    setSyncDot('loading');
    update(ref(db,'plants/'+cur), {photos:photos, cover:cover});
  };
  r.readAsDataURL(f);
};

window.dtab = function(t, el) {
  document.querySelectorAll('.dtab').forEach(function(x){x.classList.remove('on');});

function renderGJ() {
  var all=[];
  plants.forEach(function(p){(p.journal||[]).forEach(function(j){all.push({date:j.date,text:j.text,pname:p.name,emoji:p.emoji});});});
  all.sort(function(a,b){return b.date.localeCompare(a.date);});

  }).join('');
}

// Tag input system
function renderTagPills(prefix, tagsArr) {
  document.getElementById(prefix+'-tag-pills').innerHTML = tagsArr.map(function(t,i){
    return '<span class="tag-pill">'+t+'<button onmousedown="removeTag(event,\''+prefix+'\','+i+')">×</button></span>';
  }).join('');
}
window.removeTag = function(e, prefix, i) {
  e.preventDefault();
  if(prefix==='add') addTags.splice(i,1);
  else editTags.splice(i,1);
  renderTagPills(prefix, prefix==='add'?addTags:editTags);
};
function addTag(prefix, val) {
  val = val.trim();
  if(!val) return;
  var arr = prefix==='add' ? addTags : editTags;
  if(arr.indexOf(val)===-1) arr.push(val);
  renderTagPills(prefix, arr);
  document.getElementById(prefix+'-tag-input').value = '';
  hideTagSuggest(prefix);
}
window.handleTagKey = function(e, prefix) {
  if(e.key==='Enter'||e.key===',') { e.preventDefault(); addTag(prefix, e.target.value); }
  if(e.key==='Backspace'&&e.target.value===''&&(prefix==='add'?addTags:editTags).length) {
    var arr = prefix==='add'?addTags:editTags;
    arr.pop(); renderTagPills(prefix, arr);
  }
};
window.showTagSuggest = function(prefix) {
  var q = document.getElementById(prefix+'-tag-input').value.toLowerCase();
  var all = getAllTags();
  var arr = prefix==='add'?addTags:editTags;
  var matches = all.filter(function(t){ return t.toLowerCase().includes(q) && arr.indexOf(t)===-1; });
  var drop = document.getElementById(prefix+'-tag-suggest');
  var html = matches.map(function(t){ return '<div class="tag-sopt" onclick="addTag(\''+prefix+'\',\''+t+'\')">'+t+'</div>'; }).join('');
  if(q && matches.map(function(t){return t.toLowerCase();}).indexOf(q)===-1) html += '<div class="tag-sopt new" onclick="addTag(\''+prefix+'\',\''+document.getElementById(prefix+'-tag-input').value.trim()+'\')">＋ 新增「'+document.getElementById(prefix+'-tag-input').value.trim()+'」</div>';
  drop.innerHTML = html;
  drop.classList.toggle('open', !!(html));
};
window.hideTagSuggest = function(prefix) { setTimeout(function(){ document.getElementById(prefix+'-tag-suggest').classList.remove('open'); }, 250); };
window.closeShopDrop = function(){ document.getElementById('shop-drop').classList.remove('open'); };
window.filterShops = function(q) {
  var shops=getShops();
  var matches=q?shops.filter(function(s){return s.toLowerCase().includes(q.toLowerCase());}):shops;
  var drop=document.getElementById('shop-drop');
  var html=matches.map(function(s){return '<div class="shop-opt" onmousedown="pickShop(\''+s+'\')">'+s+'</div>';}).join('');
  if(q&&!matches.includes(q)) html+='<div class="shop-opt add-new" onmousedown="pickShop(\''+q+'\')">＋ 新增「'+q+'」</div>';
  drop.innerHTML=html||(shops.length?'':'<div class="shop-opt" style="color:#bbb;cursor:default">尚無店家記錄</div>');
  drop.classList.toggle('open', !!(html||shops.length));
};
window.pickShop = function(v){ document.getElementById('fsh').value=v; window.closeShopDrop(); };

window.previewCover = function(e) {
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){
    newCoverData=ev.target.result;
    var prev=document.getElementById('cover-preview');
    prev.src=newCoverData; prev.style.display='block';
    document.getElementById('cover-ph').style.display='none';
  };
  r.readAsDataURL(f);
};
function resetCoverPreview(){
  document.getElementById('cover-preview').style.display='none';
  document.getElementById('cover-ph').style.display='block';
  document.getElementById('fcover').value='';
}

function renderDash() {
  var total = plants.length;
  var cost = plants.reduce(function(s,p){return s+(p.price||0);},0);
  var avg = total ? Math.round(cost/total) : 0;
  var healthy = plants.filter(function(p){return p.health==='良好';}).length;
  var pct = total ? Math.round(healthy/total*100) : 0;
  document.getElementById('d-total').textContent = total;
  document.getElementById('d-cost').textContent = 'NT$'+cost.toLocaleString();
  document.getElementById('d-avg').textContent = 'NT$'+avg.toLocaleString();
  document.getElementById('d-health').textContent = healthy;
  document.getElementById('d-health-pct').textContent = pct+'% 狀態良好';

  // Shop bars
  var shopMap = {};
  plants.forEach(function(p){
    var s = p.shop||'未知'; shopMap[s] = (shopMap[s]||0)+(p.price||0);
  });
  var shopArr = Object.entries(shopMap).sort(function(a,b){return b[1]-a[1];});
  var maxVal = shopArr.length ? shopArr[0][1] : 1;
  document.getElementById('d-shop-bars').innerHTML = shopArr.length
    ? shopArr.map(function(s){
        var pct = Math.round(s[1]/maxVal*100);
        return '<div class="shop-bar-row">'+
          '<div class="shop-bar-label" title="'+s[0]+'">'+s[0]+'</div>'+
          '<div class="shop-bar-track"><div class="shop-bar-fill" style="width:'+pct+'%"></div></div>'+
          '<div class="shop-bar-val">NT$'+s[1].toLocaleString()+'</div></div>';
      }).join('')
    : '<div style="color:#bbb;font-size:13px">尚無資料</div>';

  // Top 5 most expensive
  var top5 = plants.slice().sort(function(a,b){return (b.price||0)-(a.price||0);}).slice(0,5);
  document.getElementById('d-rank').innerHTML = top5.length
    ? top5.map(function(p,i){
        return '<div class="rank-row">'+
          '<div class="rank-no">'+(i+1)+'</div>'+
          '<div class="rank-emoji">'+p.emoji+'</div>'+
          '<div class="rank-name">'+p.name+(p.shop?'<span style="font-size:11px;color:#aaa;font-weight:400;margin-left:6px">'+p.shop+'</span>':'')+'</div>'+
          '<div class="rank-price">NT$'+(p.price||0).toLocaleString()+'</div></div>';
      }).join('')
    : '<div style="color:#bbb;font-size:13px">尚無資料</div>';

  // Due watering
  var dueP = plants.filter(due);
  document.getElementById('d-water-list').innerHTML = dueP.length
    ? dueP.map(function(p){
        return '<div class="rank-row">'+
          '<div class="rank-emoji">'+p.emoji+'</div>'+
          '<div class="rank-name">'+p.name+'</div>'+
          '<span class="tag tw" style="font-size:11px">今天澆水！</span></div>';
      }).join('')
    : '<div style="color:#aaa;font-size:13px;padding:8px 0">目前沒有植物需要澆水 ✓</div>';
}

// ── MATERIALS ──────────────────────────────────────────
var CAT_ICONS = {'花盆':'🪴','介質':'🌱','肥料':'💊','其他':'📦'};

function renderMat() {
  var cats = ['全部'].concat(Object.keys(CAT_ICONS));
  document.getElementById('mat-cat-tabs').innerHTML = cats.map(function(c){
    return '<button class="cat-tab'+(curMatCat===(c==='全部'?'':c)?' on':'')+'" onclick="setMatCat(\''+(c==='全部'?'':c)+'\')">'+
      (c==='全部'?'全部':(CAT_ICONS[c]||'')+''+c)+'</button>';
  }).join('');

  var filtered = curMatCat ? mats.filter(function(m){return m.cat===curMatCat;}) : mats;
  var grid = document.getElementById('mat-grid');
  var empty = document.getElementById('mat-empty');
  if(!filtered.length){ grid.innerHTML=''; empty.style.display='block'; }
  else {
    empty.style.display='none';
    grid.innerHTML = filtered.map(function(m){
      var isLow = m.low && m.qty <= m.low;
      return '<div class="mat-card'+(isLow?' low':'')+'">'+
        (isLow?'<div class="mat-low-badge">庫存低</div>':'')+
        '<div class="mat-icon">'+(CAT_ICONS[m.cat]||'📦')+'</div>'+
        '<div class="mat-name">'+m.name+'</div>'+
        '<div class="mat-sub">'+(m.size?m.size:'')+(m.size&&m.material?' · ':'')+( m.material||'')+(m.brand?' · '+m.brand:'')+'</div>'+
        '<div><span class="mat-qty">'+m.qty+'</span><span class="mat-qty-unit">'+(m.unit||'個')+'</span></div>'+
        (m.price?'<div style="font-size:11px;color:#aaa;margin-top:3px">單價 NT$'+m.price+'</div>':'')+
        '<div class="mat-actions">'+
          '<button class="mat-btn in" onclick="openTxn(event,\''+m.fbKey+'\',\'in\')">＋ 入庫</button>'+
          '<button class="mat-btn out" onclick="openTxn(event,\''+m.fbKey+'\',\'out\')">－ 出庫</button>'+
          '<button class="mat-btn edit" onclick="openMatEdit(event,\''+m.fbKey+'\')">✏️</button>'+
        '</div></div>';
    }).join('');
  }

  // Recent logs
  var allLogs = [];
  mats.forEach(function(m){
    (m.logs||[]).forEach(function(l){ allLogs.push(Object.assign({mname:m.name,mcat:m.cat},l)); });
  });
  allLogs.sort(function(a,b){return b.date.localeCompare(a.date);});
  var logSec = document.getElementById('mat-log-section');
  var logList = document.getElementById('mat-log-list');
  if(allLogs.length) {
    logSec.style.display='block';
    logList.innerHTML = allLogs.slice(0,20).map(function(l){
      var isIn = l.type==='in';
      return '<div class="log-row">'+
        '<span class="'+(isIn?'log-in':'log-out')+'">'+(isIn?'＋入庫':'－出庫')+'</span>'+
        '<span style="flex:1">'+l.mname+'</span>'+
        '<span style="font-weight:500">'+(isIn?'+':'-')+l.qty+'</span>'+
        '<span style="color:#aaa;font-size:11px;margin-left:8px">'+l.date.slice(5)+'</span>'+
      '</div>';
    }).join('');
  } else logSec.style.display='none';
}

    cat: document.getElementById('m-cat').value,
    name: n,
    size: document.getElementById('m-size').value.trim(),
    material: document.getElementById('m-material').value.trim(),
    brand: document.getElementById('m-brand').value.trim(),
    price: parseInt(document.getElementById('m-price').value)||0,
    qty: parseInt(document.getElementById('m-qty').value)||0,
    unit: document.getElementById('m-unit').value||'個',
    low: parseInt(document.getElementById('m-low').value)||0,

  };

    push(matsRef, data);
  }
  window.closeMatModal();
};

// Transaction modal
window.openTxn = function(e, key, type) {
  e.stopPropagation();
  curMat = key; txnType = type; txnQtyVal = 1;
  var m = mats.find(function(x){return x.fbKey===key;}); if(!m)return;
  document.getElementById('txn-title').textContent = type==='in'?'入庫':'出庫';
  document.getElementById('txn-sub').textContent = m.name + '（目前：'+m.qty+(m.unit||'個')+'）';
  document.getElementById('txn-qty').textContent = txnQtyVal;
  document.getElementById('txn-note').value = '';
  document.getElementById('txn-modal').classList.add('show');
};
window.closeTxnModal = function(){ document.getElementById('txn-modal').classList.remove('show'); };
window.txnAdj = function(d){
  txnQtyVal = Math.max(1, txnQtyVal+d);
  document.getElementById('txn-qty').textContent = txnQtyVal;
};
window.confirmTxn = function() {
  var m = mats.find(function(x){return x.fbKey===curMat;}); if(!m)return;
  var newQty = txnType==='in' ? m.qty+txnQtyVal : Math.max(0, m.qty-txnQtyVal);
  var log = {
    type: txnType, qty: txnQtyVal,
    date: new Date().toISOString().split('T')[0],
    note: document.getElementById('txn-note').value.trim()
  };
  var logs = (m.logs||[]).concat([log]);
  setSyncDot('loading');
  update(ref(db,'materials/'+curMat), {qty:newQty, logs:logs});
  window.closeTxnModal();
};

window.movePos = function(e, key, dx, dy) {
  e.stopPropagation();
  var p = plants.find(function(x){ return x.fbKey===key; });

var editCoverX = 50, editCoverY = 50;

window.openEdit = function() {
  var p = plants.find(function(x){ return x.fbKey===cur; }); if(!p) return;
  document.getElementById('en').value = p.name||'';
  document.getElementById('ela').value = p.latin||'';
  document.getElementById('eem').value = p.emoji||'';
  document.getElementById('ed').value = p.date||'';
  document.getElementById('esh').value = p.shop||'';
  document.getElementById('epr').value = p.price||'';
  document.getElementById('ew').value = p.wdays||7;
  document.getElementById('eno').value = p.note||'';
  editTags = (p.tags||[]).slice();
  renderTagPills('edit', editTags);

  // Cover position
  editCoverX = p.coverX !== undefined ? p.coverX : 50;
  editCoverY = p.coverY !== undefined ? p.coverY : 50;
  var img = document.getElementById('edit-cover-img');
  var none = document.getElementById('edit-cover-none');
  var crosshair = document.getElementById('pos-crosshair');
  if(p.cover) {
    img.src = p.cover;
    img.style.display = 'block';
    img.style.objectPosition = editCoverX+'% '+editCoverY+'%';
    none.style.display = 'none';
    crosshair.style.display = 'block';
  } else {
    img.style.display = 'none';
    none.style.display = 'flex';
    crosshair.style.display = 'none';
  }
  updateCrosshair();
  document.getElementById('edit-modal').classList.add('show');
};

function updateCrosshair() {
  var ch = document.getElementById('pos-crosshair');
  ch.style.left = editCoverX+'%';
  ch.style.top = editCoverY+'%';
  var img = document.getElementById('edit-cover-img');
  if(img.style.display !== 'none') {
    img.style.objectPosition = editCoverX+'% '+editCoverY+'%';
  }
}

// Drag area click/drag to set position
(function(){
  var dragging = false;
  function setFromEvent(e) {
    var area = document.getElementById('pos-drag-area');
    var rect = area.getBoundingClientRect();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    var cy = e.touches ? e.touches[0].clientY : e.clientY;
    editCoverX = Math.round(Math.min(100, Math.max(0, (cx - rect.left) / rect.width * 100)));
    editCoverY = Math.round(Math.min(100, Math.max(0, (cy - rect.top) / rect.height * 100)));
    updateCrosshair();
  }
  document.addEventListener('DOMContentLoaded', function(){
    var area = document.getElementById('pos-drag-area');
    area.addEventListener('mousedown', function(e){ dragging=true; setFromEvent(e); });
    area.addEventListener('touchstart', function(e){ dragging=true; setFromEvent(e); e.preventDefault(); }, {passive:false});
    document.addEventListener('mousemove', function(e){ if(dragging) setFromEvent(e); });
    document.addEventListener('touchmove', function(e){ if(dragging) setFromEvent(e); }, {passive:false});
    document.addEventListener('mouseup', function(){ dragging=false; });
    document.addEventListener('touchend', function(){ dragging=false; });
  });
})();
